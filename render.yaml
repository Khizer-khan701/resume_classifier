services:
  - type: web
    name: resume-classifier
    env: docker
    plan: free
    region: singapore
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: resume_classifier_project.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "resume-classifier.onrender.com"
      - key: REDIS_URL
        fromService:
          type: redis
          name: cache
          property: connectionString
      - key: FIREBASE_CREDENTIALS_PATH
        value: "/app/firebase-key.json"
      - key: OPENAI_API_KEY
        sync: false
    healthCheckPath: /
  - type: redis
    name: cache
    plan: free
    ipAllowList: []
